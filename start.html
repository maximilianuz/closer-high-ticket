<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Evaluación Comercial | Maximiliano.C</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background: var(--bg-spotlight);">
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-link"><h2>MAXIMILIANO.C</h2></a>
        </div>
    </header>

    <main class="section fade-in show" style="padding-top: 140px;">
        <div class="centered-content" style="max-width: 700px;">
            <span class="tagline">Paso 1 de 2</span>
            <h1 class="section-title">Evaluación de sintonía.</h1>
            <p>Antes de conversar, necesito entender tu situación actual para confirmar que como tu socio comercial puedo aportar un crecimiento real a tu consulta.</p>
        </div>

        <form class="application-form" id="applicationForm">
            <div class="form-grid">
                <label>Nombre y Apellido <input type="text" name="nombre" required></label>
                <label>Email profesional <input type="email" name="email" required></label>
                <label>Profesión / Especialidad <input type="text" name="nicho" placeholder="Ej: Entrenador, Nutricionista, Psicólogo..." required></label>
                <label>Ticket promedio actual (USD) <input type="number" name="ticket" required></label>
                <label>Link principal (IG, LinkedIn, Web) <input type="url" name="red_social" required></label>
                <label>WhatsApp (Para contacto directo) <input type="tel" name="whatsapp" required></label>
            </div>
            
            <label style="margin-top:20px;">¿Cuál sentís que es tu mayor obstáculo para vender hoy?
                <textarea name="obstaculo" rows="4" required></textarea>
            </label>

            <div id="formError" class="form-error-msg"></div>

            <button type="submit" class="cta solid" style="width:100%; margin-top: 35px; text-align: center;">
                Validar sintonía y continuar
            </button>
        </form>
    </main>
    <script src="script.js"></script>
</body>
</html>
